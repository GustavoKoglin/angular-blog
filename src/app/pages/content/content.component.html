<div class="container__content animate-fade-in">
  <div class="content__cover">
    <img src="{{ photoCover }}" alt="Cover image for {{ contentTitle }}">
  </div>
  <div class="content__title">
    <h1>{{ contentTitle }}</h1>
    <hr />
  </div>
  <div class="content__description">
    <a [routerLink]="['']"> &larr; Voltar para Home </a>
    <p>
      {{ contentDescription }}
    </p>
  </div>
</div>
